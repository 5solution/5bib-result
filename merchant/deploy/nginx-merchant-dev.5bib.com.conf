# F-069 M5 — nginx reverse proxy for merchant-dev.5bib.com (DEV — VPS 157.10.42.171)
# Copy to /etc/nginx/sites-available/ + symlink to sites-enabled/, then:
#   certbot --nginx -d merchant-dev.5bib.com
#   nginx -t && systemctl reload nginx
#
# Proxies to the merchant container. Dev VPS maps containers with a 308x offset
# (frontend 3082, admin 3083) — if you follow that, map merchant to host 3086 and
# change the proxy_pass port below to 3086. Default here = 3006 (compose default).

server {
    server_name merchant-dev.5bib.com;

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 80;
}
