<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>5BIB Landing — Hero Prototype (FEATURE-083)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --stone:#faf9f7; --ink:#1c1917; --ink-soft:#57534e; --sand:#e9e3d8;
    --blue:#1d4ed8; --energy:#ea580c; --energy-hi:#fb923c; --trail:#166534;
    --night:#0a0a0a; --night-2:#1c1917;
    --ease-expo:cubic-bezier(.16,1,.3,1);
    --ease-spring:cubic-bezier(.34,1.56,.64,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;color:#fff;background:var(--night);
    overflow-x:hidden;-webkit-font-smoothing:antialiased;
  }
  .stage{position:relative;min-height:100svh;width:100%;overflow:hidden;isolation:isolate}

  /* ============ MEDIA LAYERS ============ */
  .media{position:absolute;inset:0;z-index:0}
  .media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .kb{animation:kenburns 22s var(--ease-expo) infinite alternate}
  @keyframes kenburns{from{transform:scale(1.08) translate(0,0)}to{transform:scale(1.2) translate(-2.5%,-2%)}}

  /* cinematic overlays */
  .scrim{position:absolute;inset:0;z-index:1;pointer-events:none}
  .scrim.grad{background:
      linear-gradient(180deg,rgba(10,10,10,.55) 0%,rgba(10,10,10,.05) 32%,rgba(10,10,10,.35) 62%,rgba(10,10,10,.92) 100%),
      radial-gradient(120% 80% at 12% 88%,rgba(234,88,12,.28),transparent 55%);}
  .scrim.vignette{box-shadow:inset 0 0 240px 40px rgba(0,0,0,.7)}
  .grain{position:absolute;inset:-50%;z-index:2;opacity:.06;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain 6s steps(6) infinite}
  @keyframes grain{0%{transform:translate(0,0)}20%{transform:translate(-8%,4%)}40%{transform:translate(6%,-6%)}60%{transform:translate(-4%,8%)}80%{transform:translate(8%,-2%)}100%{transform:translate(0,0)}}

  /* animated topo lines (used by text variant) */
  .topo{position:absolute;inset:0;z-index:0;opacity:.5}
  .topo path{fill:none;stroke:rgba(255,255,255,.14);stroke-width:1.2}
  .topo .accent{stroke:rgba(234,88,12,.5);stroke-width:1.6;stroke-dasharray:6 10;animation:dash 18s linear infinite}
  @keyframes dash{to{stroke-dashoffset:-320}}
  .mesh{position:absolute;inset:0;z-index:0;background:
    radial-gradient(90% 70% at 80% 8%,rgba(29,78,216,.45),transparent 55%),
    radial-gradient(80% 70% at 8% 92%,rgba(234,88,12,.5),transparent 55%),
    radial-gradient(70% 60% at 92% 92%,rgba(22,101,52,.4),transparent 55%),
    var(--night-2)}

  /* ============ CONTENT ============ */
  .wrap{position:relative;z-index:5;min-height:100svh;display:flex;flex-direction:column;
    justify-content:flex-end;padding:clamp(20px,5vw,72px);max-width:1280px;margin:0 auto}
  .inner{max-width:60ch}

  .kicker{display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;
    font-weight:700;font-size:clamp(11px,1.1vw,13px);letter-spacing:.28em;text-transform:uppercase;
    color:var(--energy-hi);margin-bottom:22px}
  .kicker::before{content:"";width:34px;height:2px;background:var(--energy);display:inline-block}
  .kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--energy);box-shadow:0 0 0 0 rgba(234,88,12,.7);animation:ping 2s var(--ease-expo) infinite}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(234,88,12,.6)}100%{box-shadow:0 0 0 14px rgba(234,88,12,0)}}

  h1{font-family:'Be Vietnam Pro',sans-serif;font-weight:900;line-height:.92;letter-spacing:-.02em;
    font-size:clamp(44px,8.5vw,118px);text-transform:uppercase;text-wrap:balance}
  h1 .l2{display:block;color:transparent;-webkit-text-stroke:1.5px rgba(255,255,255,.85)}
  h1 em{font-style:italic;color:var(--energy-hi)}

  .meta{display:flex;flex-wrap:wrap;gap:10px 26px;margin:26px 0 0;font-size:clamp(13px,1.4vw,16px);
    color:rgba(255,255,255,.82);font-weight:500}
  .meta span{display:inline-flex;align-items:center;gap:9px}
  .meta svg{width:17px;height:17px;stroke:var(--energy-hi);fill:none;stroke-width:1.8}

  .count{display:flex;gap:10px;margin:30px 0 4px}
  .count .blk{min-width:74px;padding:12px 8px 10px;text-align:center;border-radius:14px;
    background:rgba(255,255,255,.06);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12)}
  .count .n{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:clamp(24px,3.2vw,38px);line-height:1;
    font-variant-numeric:tabular-nums}
  .count .u{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-top:7px}

  .cta{display:flex;flex-wrap:wrap;gap:14px;margin-top:34px}
  .btn{display:inline-flex;align-items:center;gap:10px;font-weight:600;font-size:clamp(14px,1.5vw,16px);
    padding:16px 28px;border-radius:999px;text-decoration:none;cursor:pointer;border:0;
    transition:transform .35s var(--ease-spring),box-shadow .35s var(--ease-expo),background .3s}
  .btn .ar{transition:transform .35s var(--ease-spring)}
  .btn:hover .ar{transform:translateX(5px)}
  .btn-primary{position:relative;color:#fff;background:var(--energy);overflow:hidden;
    box-shadow:0 12px 34px -10px rgba(234,88,12,.75)}
  .btn-primary::after{content:"";position:absolute;inset:0;transform:translateX(-130%) skewX(-18deg);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.42),transparent);transition:transform .7s var(--ease-expo)}
  .btn-primary:hover{transform:translateY(-3px)}
  .btn-primary:hover::after{transform:translateX(130%) skewX(-18deg)}
  .btn-ghost{color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.28);backdrop-filter:blur(6px)}
  .btn-ghost:hover{background:rgba(255,255,255,.16);transform:translateY(-3px)}

  .badge-vid{position:absolute;top:clamp(20px,5vw,40px);right:clamp(20px,5vw,40px);z-index:6;
    display:inline-flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:11px;
    letter-spacing:.2em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.22);padding:8px 14px;border-radius:999px;backdrop-filter:blur(6px)}
  .badge-vid b{width:8px;height:8px;border-radius:50%;background:var(--energy);animation:ping 1.8s var(--ease-expo) infinite}

  .scroll{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);z-index:6;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.25em;text-transform:uppercase;
    color:rgba(255,255,255,.6);display:flex;flex-direction:column;align-items:center;gap:8px}
  .scroll .line{width:1px;height:34px;background:linear-gradient(rgba(255,255,255,.7),transparent);animation:fall 1.8s var(--ease-expo) infinite}
  @keyframes fall{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

  /* sponsor strip */
  .sponsors{position:relative;z-index:5;display:flex;align-items:center;gap:22px;flex-wrap:wrap;
    max-width:1280px;margin:0 auto;padding:0 clamp(20px,5vw,72px) 26px;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.5)}
  .sponsors .lbl{color:rgba(255,255,255,.38)}
  .sponsors b{color:rgba(255,255,255,.82);font-family:'Be Vietnam Pro';font-weight:800;letter-spacing:0;font-size:15px}

  /* ===== SPLIT VARIANT ===== */
  [data-variant="split"] .stage{display:grid;grid-template-columns:1.05fr .95fr}
  [data-variant="split"] .media{position:relative;grid-column:2}
  [data-variant="split"] .splitpanel{position:relative;grid-column:1;background:
    radial-gradient(80% 60% at 0% 100%,rgba(234,88,12,.22),transparent 60%),var(--night-2);display:flex}
  [data-variant="split"] .wrap{justify-content:center}
  [data-variant="split"] .scroll{display:none}
  [data-variant="split"] .scrim.grad{background:linear-gradient(90deg,rgba(10,10,10,.55),transparent 40%),linear-gradient(0deg,rgba(10,10,10,.6),transparent 50%)}
  @media(max-width:880px){[data-variant="split"] .stage{grid-template-columns:1fr}[data-variant="split"] .media{position:absolute;grid-column:1}[data-variant="split"] .splitpanel{display:contents}}

  /* ===== TEXT VARIANT ===== */
  [data-variant="text"] h1 .l2{-webkit-text-stroke:1.5px var(--energy);color:transparent}
  [data-variant="text"] .wrap{justify-content:center}

  /* entrance animation */
  .rise{opacity:0;transform:translateY(28px);animation:rise .9s var(--ease-expo) forwards}
  .d1{animation-delay:.05s}.d2{animation-delay:.16s}.d3{animation-delay:.28s}.d4{animation-delay:.4s}.d5{animation-delay:.52s}.d6{animation-delay:.64s}
  @keyframes rise{to{opacity:1;transform:none}}

  /* ===== demo switcher (NOT part of product) ===== */
  .demobar{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;display:flex;align-items:center;gap:6px;
    background:rgba(12,12,12,.72);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(14px);
    padding:7px 8px;border-radius:999px;box-shadow:0 18px 40px -16px rgba(0,0,0,.8)}
  .demobar .tag{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;
    color:rgba(255,255,255,.5);padding:0 10px 0 6px;border-right:1px solid rgba(255,255,255,.14);margin-right:4px}
  .demobar button{font-family:'Inter';font-size:12.5px;font-weight:600;color:rgba(255,255,255,.7);background:transparent;
    border:0;padding:8px 15px;border-radius:999px;cursor:pointer;transition:.2s}
  .demobar button:hover{color:#fff;background:rgba(255,255,255,.08)}
  .demobar button.on{color:#fff;background:var(--energy)}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.rise{opacity:1;transform:none}}
  @media(max-width:560px){.count .blk{min-width:62px}.kicker{margin-bottom:16px}}
</style>
</head>
<body data-variant="video">

  <div class="demobar" role="group" aria-label="Demo: chọn biến thể Hero">
    <span class="tag">Hero variant</span>
    <button data-v="video" class="on">Video nền</button>
    <button data-v="image">Ảnh nền</button>
    <button data-v="text">Chữ</button>
    <button data-v="split">Split</button>
  </div>

  <div class="stage">
    <div class="splitpanel"></div>

    <!-- media -->
    <div class="media" id="media">
      <img class="kb" id="heroimg" alt="" src="https://images.unsplash.com/photo-1502904550040-7534597429ae?auto=format&fit=crop&w=1700&q=80" />
    </div>
    <svg class="topo" id="topo" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <path d="M-20,180 C 320,90 560,260 820,180 1080,100 1300,250 1480,170"/>
      <path d="M-20,320 C 300,230 600,400 900,300 1160,215 1320,360 1480,300"/>
      <path class="accent" d="M-20,470 C 320,360 600,560 920,450 1180,360 1340,520 1480,440"/>
      <path d="M-20,620 C 280,520 620,700 940,600 1180,525 1360,660 1480,600"/>
      <path d="M-20,760 C 320,660 600,820 900,740 1160,675 1340,800 1480,750"/>
    </svg>
    <div class="mesh" id="mesh" style="display:none"></div>

    <div class="scrim grad"></div>
    <div class="scrim vignette"></div>
    <div class="grain"></div>

    <div class="badge-vid" id="vidbadge"><b></b> Video nền · Highlight reel</div>

    <div class="wrap">
      <div class="inner">
        <span class="kicker rise d1"><span class="dot"></span>Ultra Trail · Mộc Châu 2026</span>
        <h1>
          <span class="rise d2">Vịnh Hạ Long</span>
          <span class="l2 rise d3">Marathon<em>.</em></span>
        </h1>

        <div class="meta rise d4">
          <span><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>14 Tháng 3, 2026</span>
          <span><svg viewBox="0 0 24 24"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Bãi Cháy, Quảng Ninh</span>
          <span><svg viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>5K · 10K · 21K · 42K</span>
        </div>

        <div class="count rise d5" id="count" aria-label="Đếm ngược ngày đua">
          <div class="blk"><div class="n" id="dd">00</div><div class="u">Ngày</div></div>
          <div class="blk"><div class="n" id="hh">00</div><div class="u">Giờ</div></div>
          <div class="blk"><div class="n" id="mm">00</div><div class="u">Phút</div></div>
          <div class="blk"><div class="n" id="ss">00</div><div class="u">Giây</div></div>
        </div>

        <div class="cta rise d6">
          <a class="btn btn-primary" href="#">Đăng ký ngay <span class="ar">→</span></a>
          <a class="btn btn-ghost" href="#">Xem cung đường</a>
        </div>
      </div>
    </div>

    <div class="scroll" id="scroll"><span>Cuộn</span><span class="line"></span></div>
  </div>

  <div class="sponsors">
    <span class="lbl">Đồng hành</span><b>COROS</b><b>5BIB</b><b>Garmin</b><b>Number 1</b>
  </div>

<script>
  const body=document.body, img=document.getElementById('heroimg'),
    topo=document.getElementById('topo'), mesh=document.getElementById('mesh'),
    media=document.getElementById('media'), vidbadge=document.getElementById('vidbadge'),
    scroll=document.getElementById('scroll');
  const PHOTOS={
    video:'https://images.unsplash.com/photo-1502904550040-7534597429ae?auto=format&fit=crop&w=1700&q=80',
    image:'https://images.unsplash.com/photo-1486218119243-13883505764c?auto=format&fit=crop&w=1700&q=80',
    split:'https://images.unsplash.com/photo-1571008887538-b36bb32f4571?auto=format&fit=crop&w=1400&q=80'
  };
  function setVariant(v){
    body.setAttribute('data-variant',v);
    document.querySelectorAll('.demobar button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
    const isText=v==='text';
    media.style.display=isText?'none':'block';
    topo.style.display=isText?'block':'none';
    mesh.style.display=isText?'block':'none';
    vidbadge.style.display=v==='video'?'inline-flex':'none';
    scroll.style.display=v==='split'?'none':'flex';
    if(!isText && PHOTOS[v]) img.src=PHOTOS[v];
    img.classList.toggle('kb', v==='video' || v==='image');
    document.querySelectorAll('.rise').forEach(el=>{el.style.animation='none';void el.offsetWidth;el.style.animation='';});
  }
  document.querySelectorAll('.demobar button').forEach(b=>b.addEventListener('click',()=>setVariant(b.dataset.v)));
  const h=(location.hash||'').replace('#','');
  if(['video','image','text','split'].includes(h)) setVariant(h);

  const TARGET=new Date('2026-03-14T05:00:00+07:00').getTime();
  const p=n=>String(Math.max(0,n)).padStart(2,'0');
  function tick(){
    const d=Math.max(0,TARGET-Date.now()),s=Math.floor(d/1000);
    document.getElementById('dd').textContent=p(Math.floor(s/86400));
    document.getElementById('hh').textContent=p(Math.floor(s%86400/3600));
    document.getElementById('mm').textContent=p(Math.floor(s%3600/60));
    document.getElementById('ss').textContent=p(s%60);
  }
  tick();setInterval(tick,1000);
</script>
</body>
</html>
