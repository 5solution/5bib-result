name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build & deploy (all, backend, frontend, admin, crew, content-web)"
        required: false
        default: "all"

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      admin: ${{ steps.filter.outputs.admin }}
      crew: ${{ steps.filter.outputs.crew }}
      content-web: ${{ steps.filter.outputs.content-web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            admin:
              - 'admin/**'
            crew:
              - 'crew/**'
            content-web:
              - 'content-web/**'

  build-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'backend' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-admin:
    needs: changes
    if: ${{ needs.changes.outputs.admin == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'admin' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/admin
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./admin
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-crew:
    needs: changes
    if: ${{ needs.changes.outputs.crew == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'crew' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/crew
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./crew
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-content-web:
    needs: changes
    if: ${{ needs.changes.outputs.content-web == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'content-web' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/content-web
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./content-web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: [build-backend, build-frontend, build-admin, build-crew, build-content-web]
    if: ${{ always() && !cancelled() && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.build-admin.result == 'success' || needs.build-crew.result == 'success' || needs.build-content-web.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          TAG_SHA: ${{ github.sha }}
          BUILT_BACKEND: ${{ needs.build-backend.result }}
          BUILT_FRONTEND: ${{ needs.build-frontend.result }}
          BUILT_ADMIN: ${{ needs.build-admin.result }}
          BUILT_CREW: ${{ needs.build-crew.result }}
          BUILT_CONTENT_WEB: ${{ needs.build-content-web.result }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: TAG_SHA,BUILT_BACKEND,BUILT_FRONTEND,BUILT_ADMIN,BUILT_CREW,BUILT_CONTENT_WEB
          script: |
            set -e
            TAG=${TAG_SHA:0:7}
            TOKEN=$(grep -oP 'ghp_[A-Za-z0-9]+' /opt/.github_token)
            echo "$TOKEN" | docker login ghcr.io -u 0xaldric --password-stdin
            cd /opt/5bib-result

            # Bump image tag + pull + restart INLINE per service. Lý do:
            # appleboy/ssh-action @ v1 bóp méo multi-line `for ... do ... done`
            # heredoc → loop chạy 1 lần với value joined → "no such service:
            # 5bib-result-backend 5bib-result-admin" (đã fail bd10c2c, c5265dd).
            # Inline atomic per-if là pattern duy nhất ổn định qua appleboy
            # ssh-action: chỉ literal docker compose calls trong từng block.
            DEPLOYED_ANY=0
            if [ "$BUILT_BACKEND" = "success" ]; then
              sed -i "s|ghcr.io/5solution/5bib-result/backend:.*|ghcr.io/5solution/5bib-result/backend:${TAG}|" docker-compose.yml
              docker compose pull 5bib-result-backend
              docker compose up -d --force-recreate 5bib-result-backend
              DEPLOYED_ANY=1
            fi
            if [ "$BUILT_FRONTEND" = "success" ]; then
              sed -i "s|ghcr.io/5solution/5bib-result/frontend:.*|ghcr.io/5solution/5bib-result/frontend:${TAG}|" docker-compose.yml
              docker compose pull 5bib-result-frontend
              docker compose up -d --force-recreate 5bib-result-frontend
              DEPLOYED_ANY=1
            fi
            if [ "$BUILT_ADMIN" = "success" ]; then
              sed -i "s|ghcr.io/5solution/5bib-result/admin:.*|ghcr.io/5solution/5bib-result/admin:${TAG}|" docker-compose.yml
              docker compose pull 5bib-result-admin
              docker compose up -d --force-recreate 5bib-result-admin
              DEPLOYED_ANY=1
            fi
            if [ "$BUILT_CREW" = "success" ]; then
              sed -i "s|ghcr.io/5solution/5bib-result/crew:.*|ghcr.io/5solution/5bib-result/crew:${TAG}|" docker-compose.yml
              docker compose pull 5bib-result-crew
              docker compose up -d --force-recreate 5bib-result-crew
              DEPLOYED_ANY=1
            fi
            if [ "$BUILT_CONTENT_WEB" = "success" ]; then
              sed -i "s|ghcr.io/5solution/5bib-result/content-web:.*|ghcr.io/5solution/5bib-result/content-web:${TAG}|" docker-compose.yml
              docker compose pull 5bib-result-content-web
              docker compose up -d --force-recreate 5bib-result-content-web
              DEPLOYED_ANY=1
            fi
            if [ "$DEPLOYED_ANY" = "0" ]; then
              echo "No services built — nothing to deploy"
            fi
            docker image prune -f
