services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
      - PORT=8081
      - MONGODB_URI=mongodb://mongo:27017/5bib
      - JWT_SECRET=${JWT_SECRET:-5bib-secret-key-change-in-production}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-ap-southeast-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - BACKEND_URL=http://backend:8081
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8081
    depends_on:
      - backend
    restart: unless-stopped

  # F-069 M5 — Merchant Portal (merchant.5bib.com). Logto config 100% runtime.
  merchant:
    build:
      context: ./merchant
      dockerfile: Dockerfile
    ports:
      - "3006:3006"
    environment:
      - BACKEND_URL=http://backend:8081
      - LOGTO_ENDPOINT=${LOGTO_ENDPOINT:-https://auth.5bib.com}
      - LOGTO_API_RESOURCE=${LOGTO_API_RESOURCE:-https://api.5bib.com}
      - LOGTO_APP_ID=${MERCHANT_LOGTO_APP_ID}
      - LOGTO_APP_SECRET=${MERCHANT_LOGTO_APP_SECRET}
      - LOGTO_BASE_URL=${MERCHANT_LOGTO_BASE_URL:-https://merchant.5bib.com}
      - LOGTO_COOKIE_SECRET=${MERCHANT_LOGTO_COOKIE_SECRET}
      - LOGTO_COOKIE_SECURE=${MERCHANT_LOGTO_COOKIE_SECURE:-true}
    depends_on:
      - backend
    restart: unless-stopped

  crew:
    build:
      context: ./crew
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - BACKEND_URL=http://backend:8081
      - NEXT_PUBLIC_CREW_ORIGIN=${NEXT_PUBLIC_CREW_ORIGIN:-https://crew-dev.5bib.com}
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
